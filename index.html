<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Iris Archive</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="iris-home" id="irisHome">
    <video
      id="eyeVideo"
      class="eye-video"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      poster="./assets/eye-poster.jpg"
      aria-hidden="true"
    >
      <source src="./assets/eye-loop.mp4" type="video/mp4" />
    </video>

    <div class="screen-shadow" aria-hidden="true"></div>
    <div class="edge-fog fog-a" aria-hidden="true"></div>
    <div class="edge-fog fog-b" aria-hidden="true"></div>
    <div class="glass-sheen" aria-hidden="true"></div>
    <div class="film-grain" aria-hidden="true"></div>

    <form class="iris-search" id="irisSearch" autocomplete="off">
      <div class="search-dimensional-wrap">
        <input
          id="irisInput"
          class="iris-input"
          type="text"
          aria-label="Enter archive code"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <span class="search-glow" aria-hidden="true"></span>
        <span class="search-depth" aria-hidden="true"></span>
      </div>
    </form>

    <p class="iris-status" id="irisStatus" aria-live="polite"></p>
  </main>

  <script src="./app.js"></script>
</body>
</html>
