<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iris Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="home">
    <video class="eye-video" autoplay muted loop playsinline>
      <source src="assets/eye-loop.mp4" type="video/mp4" />
    </video>

    <div class="veil"></div>

    <form class="search-wrap" id="searchForm">
      <input
        id="searchInput"
        type="text"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search psychedelic state"
      />
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
